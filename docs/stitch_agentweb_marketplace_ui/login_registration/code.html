<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgentWeb - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#00174b",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed": "#ffdbcd",
                        "surface": "#f8f9fa",
                        "outline-variant": "#c3c6d7",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-container": "#acbfff",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#ffede6",
                        "tertiary": "#943700",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9fa",
                        "on-primary-container": "#eeefff",
                        "secondary": "#495c95",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "secondary-fixed-dim": "#b4c5ff",
                        "surface-tint": "#0053db",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-secondary-container": "#394c84",
                        "on-surface": "#191c1d",
                        "inverse-primary": "#b4c5ff",
                        "surface-dim": "#d9dadb",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed": "#00174b",
                        "inverse-surface": "#2e3132",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-fixed": "#dbe1ff",
                        "primary": "#004ac6",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#31447b",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "outline": "#737686",
                        "tertiary-container": "#bc4800",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#434655",
                        "on-tertiary-fixed": "#360f00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .bg-gradient-primary { background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%); }
        .shadow-ambient { box-shadow: 0 20px 40px rgba(25, 28, 29, 0.05); }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Container for both forms to show them side-by-side or stacked for demonstration -->
<div class="flex flex-col xl:flex-row gap-12 xl:gap-24 w-full max-w-7xl items-start justify-center">
<!-- Login Form -->
<div class="w-full max-w-md mx-auto bg-surface-container-lowest rounded-xl shadow-ambient overflow-hidden border border-outline-variant/15 flex flex-col relative z-10">
<!-- Decorative Header -->
<div class="h-2 bg-gradient-primary w-full"></div>
<div class="p-8 sm:p-10 flex flex-col gap-8">
<!-- Logo & Header -->
<div class="flex flex-col items-center text-center gap-4">
<div class="h-12 w-12 bg-surface-container-low rounded-xl flex items-center justify-center text-primary border border-outline-variant/15">
<span class="material-symbols-outlined text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">api</span>
</div>
<div>
<h1 class="text-2xl font-bold tracking-tight text-on-surface">Login to AgentWeb</h1>
<p class="text-sm text-on-surface-variant mt-2">Welcome back to the intelligent ether.</p>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-on-surface-variant" for="login-email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-primary/100 focus:ring-4 focus:ring-primary-fixed/50 transition-all font-mono" id="login-email" placeholder="developer@agentweb.io" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-on-surface-variant" for="login-password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-primary/100 focus:ring-4 focus:ring-primary-fixed/50 transition-all font-mono" id="login-password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-lg">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-gradient-primary text-on-primary font-medium text-sm rounded-xl py-3.5 mt-2 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                        Login
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="text-center">
<p class="text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Register</a>
</p>
</div>
</div>
</div>
<!-- Registration Form -->
<div class="w-full max-w-md mx-auto bg-surface-container-lowest rounded-xl shadow-ambient overflow-hidden border border-outline-variant/15 flex flex-col relative z-10">
<!-- Decorative Header -->
<div class="h-2 bg-gradient-primary w-full"></div>
<div class="p-8 sm:p-10 flex flex-col gap-8">
<!-- Logo & Header -->
<div class="flex flex-col items-center text-center gap-4">
<div class="h-12 w-12 bg-surface-container-low rounded-xl flex items-center justify-center text-primary border border-outline-variant/15">
<span class="material-symbols-outlined text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_reaction</span>
</div>
<div>
<h1 class="text-2xl font-bold tracking-tight text-on-surface">Create AgentWeb Account</h1>
<p class="text-sm text-on-surface-variant mt-2">Deploy your first autonomous agent today.</p>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-on-surface-variant" for="register-email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-primary/100 focus:ring-4 focus:ring-primary-fixed/50 transition-all font-mono" id="register-email" placeholder="developer@agentweb.io" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-on-surface-variant" for="register-password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-primary/100 focus:ring-4 focus:ring-primary-fixed/50 transition-all font-mono" id="register-password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="flex flex-col gap-1 mt-1">
<div class="flex gap-1 h-1 w-full rounded-full overflow-hidden bg-surface-container-high">
<div class="w-1/3 bg-error h-full rounded-full transition-all duration-300"></div>
<div class="w-1/3 bg-tertiary-container h-full rounded-full transition-all duration-300 opacity-0"></div>
<div class="w-1/3 bg-primary h-full rounded-full transition-all duration-300 opacity-0"></div>
</div>
<span class="text-xs text-error font-medium">Weak password</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-on-surface-variant flex justify-between" for="register-nickname">
<span>Nickname</span>
<span class="text-xs text-outline font-normal">Optional</span>
</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-primary/100 focus:ring-4 focus:ring-primary-fixed/50 transition-all" id="register-nickname" placeholder="Agent Master" type="text"/>
</div>
<button class="w-full bg-gradient-primary text-on-primary font-medium text-sm rounded-xl py-3.5 mt-2 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                        Register
                        <span class="material-symbols-outlined text-sm">how_to_reg</span>
</button>
</form>
<!-- Footer -->
<div class="text-center">
<p class="text-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Login</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
